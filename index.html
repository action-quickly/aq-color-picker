<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: rgba(30,30,35,0.95); color: #e8e8e8; padding: 20px; height: 100vh; display: flex; flex-direction: column; gap: 16px; }
    h1 { font-size: 18px; }
    .preview { height: 80px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: #4a9eff; }
    .row { display: flex; align-items: center; gap: 12px; }
    label { font-size: 13px; color: #999; width: 50px; flex-shrink: 0; }
    input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 8px 12px; color: #e8e8e8; font-family: "Cascadia Code", monospace; font-size: 13px; outline: none; }
    input:focus { border-color: #4a9eff; }
    input[type="color"] { height: 36px; padding: 2px; cursor: pointer; }
    button { background: #4a9eff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
    button:hover { background: #3a8ee5; }
    .result { font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <h1>颜色拾取器</h1>
  <div class="preview" id="preview"></div>
  <div class="row">
    <label>选色</label>
    <input type="color" id="colorPicker" value="#4a9eff" onchange="onColorChange()" />
  </div>
  <div class="row">
    <label>HEX</label>
    <input id="hex" value="#4a9eff" oninput="convert('hex')" />
    <button onclick="copy('hex')">复制</button>
  </div>
  <div class="row">
    <label>RGB</label>
    <input id="rgb" value="rgb(74, 158, 255)" oninput="convert('rgb')" />
    <button onclick="copy('rgb')">复制</button>
  </div>
  <div class="row">
    <label>HSL</label>
    <input id="hsl" value="hsl(213, 100%, 65%)" readonly />
    <button onclick="copy('hsl')">复制</button>
  </div>
  <div class="result" id="result"></div>
  <script>
    var ipcId = 0, pending = {};
    function invoke(cmd, args) {
      return new Promise(function(resolve, reject) {
        var id = ++ipcId; pending[id] = { resolve: resolve, reject: reject };
        window.parent.postMessage({ source: "action-quick-plugin", id: id, cmd: cmd, args: args || {} }, "*");
      });
    }
    window.addEventListener("message", function(e) {
      var d = e.data;
      if (!d || d.source !== "action-quick-host") return;
      if (d.type === "aq-init-bridge" && d.script) { try { eval(d.script); } catch(x){} return; }
      if (d.type === "plugin-params" && d.params.contextText) {
        document.getElementById("hex").value = d.params.contextText;
        convert("hex");
      }
      if (d.id && pending[d.id]) { var c = pending[d.id]; delete pending[d.id]; d.error ? c.reject(d.error) : c.resolve(d.result); }
    });

    function onColorChange() {
      document.getElementById("hex").value = document.getElementById("colorPicker").value;
      convert("hex");
    }

    function convert(from) {
      var hex, r, g, b;
      if (from === "hex") {
        hex = document.getElementById("hex").value;
        var m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
        if (!m) return;
        r = parseInt(m[1], 16); g = parseInt(m[2], 16); b = parseInt(m[3], 16);
      } else if (from === "rgb") {
        var m2 = document.getElementById("rgb").value.match(/(\d+)\D+(\d+)\D+(\d+)/);
        if (!m2) return;
        r = +m2[1]; g = +m2[2]; b = +m2[3];
        hex = "#" + [r,g,b].map(function(x) { return x.toString(16).padStart(2,"0"); }).join("");
        document.getElementById("hex").value = hex;
      } else return;

      document.getElementById("rgb").value = "rgb(" + r + ", " + g + ", " + b + ")";
      document.getElementById("preview").style.background = hex;
      document.getElementById("colorPicker").value = hex;

      var hsl = rgbToHsl(r, g, b);
      document.getElementById("hsl").value = "hsl(" + hsl[0] + ", " + hsl[1] + "%, " + hsl[2] + "%)";
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var max = Math.max(r,g,b), min = Math.min(r,g,b);
      var h, s, l = (max+min)/2;
      if (max === min) { h = s = 0; }
      else {
        var d = max - min;
        s = l > 0.5 ? d/(2-max-min) : d/(max+min);
        switch(max) {
          case r: h = (g-b)/d + (g<b?6:0); break;
          case g: h = (b-r)/d + 2; break;
          case b: h = (r-g)/d + 4; break;
        }
        h *= 60;
      }
      return [Math.round(h), Math.round(s*100), Math.round(l*100)];
    }

    function copy(field) {
      invoke("aq_clipboard_write", { text: document.getElementById(field).value }).then(function() { setResult("已复制"); }).catch(function(e) { setResult("错误: " + e); });
    }
    function setResult(msg) { document.getElementById("result").textContent = msg; }
  </script>
</body>
</html>
